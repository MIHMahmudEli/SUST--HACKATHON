# Render Blueprint — deploys QueueStorm Investigator as a Docker web service.
# In Render: New + > Blueprint > connect this repo. Then set GROQ_API_KEY in the
# dashboard (marked sync:false so it is never stored in git).
services:
  - type: web
    name: queuestorm-investigator
    runtime: docker
    plan: free
    region: singapore           # closest to the ap-southeast-1 judging region
    dockerfilePath: ./Dockerfile
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: GROQ_API_KEY
        sync: false             # set in Render dashboard, NOT committed
      - key: GROQ_MODEL
        value: llama-3.1-8b-instant
      - key: USE_LLM
        value: "true"
      - key: LLM_TIMEOUT_MS
        value: "8000"
      # PORT is injected by Render automatically; main.ts reads process.env.PORT.
